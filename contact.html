<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us | Aariyansh Aari Work</title>

  <!-- GOOGLE FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- FONT AWESOME (FOR INSTAGRAM ICON) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= CONTACT SECTION ================= -->
<section class="contact-section" id="contact">
     <h2 class="contact-title">CONNECT WITH US</h2>
  
  <div class="contact-wrapper">

    <!-- LEFT INFO -->
    <div class="contact-info">
      <h1>Get In Touch</h1>
      <p>
        We create elegant handcrafted Aari embroidery for blouses, sarees,
        bridal wear & custom designs.  
        Connect with us for premium detailing.
      </p>

      <div class="info-box">
        <p><strong>📍 Location:</strong> Pune, Maharashtra</p>
        <p><strong>📞 Phone:</strong> +91 76205 35309</p>
        <p><strong>📧 Email:</strong> aariwork@gmail.com</p>

        <!-- INSTAGRAM -->
        <div class="contact-item instagram">
          <i class="fab fa-instagram"></i>
          <a 
            href="https://www.instagram.com/jayashri_creation0399" 
            target="_blank"
          >
            @jayashri_creation0399
          </a>
        </div>
      </div>
    </div>

    <!-- RIGHT FORM -->
    <form id="contactForm" class="contact-form">
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="tel" placeholder="Mobile Number" required>

      <select required>
        <option value="">Select Design Type</option>
        <option>Bridal Blouse Aari Work</option>
        <option>Saree Border Aari Work</option>
        <option>Concept Blouse</option>
        <option>Custom Design</option>
      </select>

      <textarea placeholder="Your Message" rows="4"></textarea>

      <button type="submit" class="btn-whatsapp">
        Send via WhatsApp
      </button>
    </form>

  </div>
</section>




<!-- JS -->
<script src="contact.js"></script>

</body>
</html>
